syntax = "proto3";

package plugin.cipher_wrapper.v1;

import "buf/validate/validate.proto";

// KeyWrapper defines the universal envelope encryption interface for CMK.
// It allows the core engine to delegate cryptographic wrapping and unwrapping
// to any external provider (AWS KMS, Google Cloud KMS, Azure Key Vault,
// HashiCorp Vault, or hardware HSMs via PKCS#11) over a local gRPC socket.
service CipherWrapper {
  // Wrap encrypts the provided plaintext using the remote KMS provider.
  rpc Wrap(WrapRequest) returns (WrapResponse);

  // Unwrap decrypts the provided ciphertext using the remote KMS provider,
  // returning the raw plaintext key material.
  rpc Unwrap(UnwrapRequest) returns (UnwrapResponse);
}

// WrapRequest contains the raw key material and the context needed to encrypt it.
message WrapRequest {
  // REQUIRED: The raw cryptographic material to be wrapped.
  bytes plaintext = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).bytes.min_len = 1
  ];

  // OPTIONAL: Standard Additional Authenticated Data (AAD) byte buffer.
  // Kept in proto because AAD often changes per request (e.g., binding to a specific Tenant ID).
  optional bytes aad = 2;

  // OPTIONAL: Initialization Vector (IV) or Nonce.
  // Cryptographically dynamic, must remain in proto.
  optional bytes iv = 3;

  // OPTIONAL: Per-request dynamic context (if needed).
  // Kept as an escape hatch for truly dynamic per-request overrides.
  map<string, string> dynamic_context = 900;
}

// WrapResponse returns the provider-specific ciphertext and metadata.
message WrapResponse {
  // REQUIRED: The opaque, vendor-specific ciphertext.
  bytes ciphertext = 1;

  // OPTIONAL: The exact key version ID used during the operation.
  // Some providers (like HSMs) do not have a concept of version IDs.
  optional string key_version_id = 2;

  // OPTIONAL: The Initialization Vector generated by the provider.
  // Returned only if the provider generated it and CMK needs to store it.
  optional bytes iv = 3;
}

// UnwrapRequest contains the opaque ciphertext and the exact parameters
// originally used during the Wrap operation.
message UnwrapRequest {
  // REQUIRED: The opaque ciphertext retrieved from the CMK persistent storage.
  bytes ciphertext = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).bytes.min_len = 1
  ];

  // OPTIONAL: Standard Additional Authenticated Data (AAD) byte buffer.
  optional bytes aad = 2;

  // OPTIONAL: Initialization Vector (IV) or Nonce.
  // Must be provided if it was returned in the WrapResponse.
  optional bytes iv = 3;

  // OPTIONAL: Per-request dynamic context (if needed).
  // Kept as an escape hatch for truly dynamic per-request overrides.
  map<string, string> dynamic_context = 900;
}

// UnwrapResponse returns the recovered raw cryptographic material.
message UnwrapResponse {
  // REQUIRED: The recovered raw cryptographic material.
  bytes plaintext = 1;
}
